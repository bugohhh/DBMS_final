server.port=${SERVER_PORT:8080}

# Public, non-secret defaults. Real machine-specific database settings should live in
# backend/src/main/resources/application-local.properties, which is ignored by Git.
spring.config.import=optional:file:./src/main/resources/application-local.properties,optional:file:./application-local.properties
spring.datasource.url=jdbc:mysql://localhost:3306/dbms-example?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Taipei&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
server.servlet.encoding.enabled=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true