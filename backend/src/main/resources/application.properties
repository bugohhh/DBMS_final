server.port=${SERVER_PORT:8080}

# Public, non-secret defaults. Real machine-specific database settings should live in
# backend/src/main/resources/application-local.properties, which is ignored by Git.
spring.config.import=optional:file:./src/main/resources/application-local.properties,optional:file:./application-local.properties
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/dbms-example?serverTimezone=Asia/Taipei&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
